name: Release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-home-cache-excludes: |
          caches/modules-2/modules-2.lock
          caches/modules-2/gc.properties

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: List Build Outputs
      if: success()
      run: |
        echo "Checking for APK files..."
        find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Full app/build directory:"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"

    - name: Create Release
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        TAG_NAME="release-${SHORT_SHA}"

        # Find APK file
        APK_FILE=$(find app/build/outputs -name "*.apk" -type f | head -1)

        if [ -z "$APK_FILE" ]; then
          echo "ERROR: No APK file found"
          exit 1
        fi

        echo "Found APK: $APK_FILE"

        # Create release with found APK
        gh release create "$TAG_NAME" \
          "$APK_FILE" \
          --title "APK Build $TAG_NAME" \
          --notes "Automated APK release from commit $SHORT_SHA"
