name: Release APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-home-cache-excludes: |
          caches/modules-2/modules-2.lock
          caches/modules-2/gc.properties

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Create Release
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        TAG_NAME="release-${SHORT_SHA}"

        # Check if APK exists
        if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "ERROR: APK not found at app/build/outputs/apk/debug/app-debug.apk"
          ls -la app/build/outputs/apk/debug/ || echo "Directory does not exist"
          exit 1
        fi

        # Create release
        gh release create "$TAG_NAME" \
          app/build/outputs/apk/debug/app-debug.apk \
          --title "APK Build $TAG_NAME" \
          --notes "Automated APK release from commit $SHORT_SHA"
